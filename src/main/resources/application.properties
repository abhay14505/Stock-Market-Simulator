spring.datasource.url=${DB_URL:jdbc:h2:file:./data/stocksim;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
management.endpoints.web.exposure.include=health,info,mappings

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

market.simulation.enabled=true
market.simulation.tick-ms=1000
market.simulation.min-interval-ms=5000
market.simulation.max-interval-ms=25000
market.simulation.base-volatility=0.0035
market.simulation.mean-reversion=0.04
market.simulation.shock-probability=0.003
market.simulation.shock-min=0.03
market.simulation.shock-max=0.09
market.simulation.max-step=0.12