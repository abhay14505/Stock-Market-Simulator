<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <p class="metric-label mb-2">Trade History</p>
            <h1 class="mb-0" th:text="${'Transactions for ' + trader.name}"></h1>
        </div>
        <a class="btn btn-accent" th:href="@{/web/dashboard/{id}(id=${trader.userId})}">Open Dashboard</a>
    </div>
    <div class="surface-card table-panel">
        <div th:if="${#lists.isEmpty(transactions)}" class="empty-state">No transactions available for this trader.</div>
        <div th:unless="${#lists.isEmpty(transactions)}" class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Txn ID</th>
                    <th>Type</th>
                    <th>Stock ID</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Timestamp</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="transaction : ${transactions}" th:classappend="${transaction.type == 'BUY'} ? 'txn-buy' : 'txn-sell'">
                    <td th:text="${transaction.transactionId}"></td>
                    <td><span class="badge-soft" th:classappend="${transaction.type == 'BUY'} ? ' badge-buy' : ' badge-sell'" th:text="${transaction.type}"></span></td>
                    <td th:text="${transaction.stockId}"></td>
                    <td th:text="${transaction.quantity}"></td>
                    <td th:text="${'Rs ' + #numbers.formatDecimal(transaction.price, 1, 2)}"></td>
                    <td th:text="${'Rs ' + #numbers.formatDecimal(transaction.quantity * transaction.price, 1, 2)}"></td>
                    <td th:text="${#temporals.format(transaction.timestamp, 'dd MMM yyyy, hh:mm a')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
