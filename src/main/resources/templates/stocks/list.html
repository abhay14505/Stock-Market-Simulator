<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <p class="metric-label mb-2">Market Watch</p>
            <h1 class="mb-0">Stock Listings</h1>
            <p class="muted-text mb-0">Auto refresh: every 4 seconds</p>
        </div>
        <a class="btn btn-accent" th:href="@{/web/stocks/new}">Add New Stock</a>
    </div>
    <div class="surface-card table-panel">
        <div th:if="${#lists.isEmpty(stocks)}" class="empty-state">No stocks available yet.</div>
        <div th:unless="${#lists.isEmpty(stocks)}" class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Stock ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Available Qty</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="stocksTableBody">
                <tr th:each="stock : ${stocks}" th:classappend="${stock.availableQuantity > 100} ? 'stock-row-high' : (${stock.availableQuantity >= 10} ? 'stock-row-mid' : 'stock-row-low')">
                    <td th:text="${stock.stockId}"></td>
                    <td th:text="${stock.name}"></td>
                    <td th:text="${'Rs ' + #numbers.formatDecimal(stock.price, 1, 2)}"></td>
                    <td th:text="${stock.availableQuantity}"></td>
                    <td class="d-flex flex-wrap gap-2">
                        <a class="btn btn-sm btn-outline-light" th:href="@{/web/stocks/{id}/edit(id=${stock.stockId})}">Update</a>
                        <a class="btn btn-sm btn-buy" th:href="@{/web/trade}">Trade</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const stocksTableBody = document.getElementById('stocksTableBody');
    const previousPrices = new Map();

    function formatMoney(value) {
        return 'Rs ' + Number(value).toFixed(2);
    }

    function stockRowClass(availableQuantity) {
        if (availableQuantity > 100) {
            return 'stock-row-high';
        }
        if (availableQuantity >= 10) {
            return 'stock-row-mid';
        }
        return 'stock-row-low';
    }

    function priceDirectionClass(stockId, currentPrice) {
        if (!previousPrices.has(stockId)) {
            previousPrices.set(stockId, currentPrice);
            return 'price-stable';
        }

        const previousPrice = previousPrices.get(stockId);
        previousPrices.set(stockId, currentPrice);

        if (currentPrice > previousPrice) {
            return 'price-up';
        }
        if (currentPrice < previousPrice) {
            return 'price-down';
        }
        return 'price-stable';
    }

    function renderStocks(stocks) {
        if (!stocksTableBody) {
            return;
        }

        stocksTableBody.innerHTML = stocks.map((stock) => {
            const rowClass = stockRowClass(stock.availableQuantity);
            const priceClass = priceDirectionClass(stock.stockId, Number(stock.price));
            return `
                <tr class="${rowClass}">
                    <td>${stock.stockId}</td>
                    <td>${stock.name}</td>
                    <td class="${priceClass}">${formatMoney(stock.price)}</td>
                    <td>${stock.availableQuantity}</td>
                    <td class="d-flex flex-wrap gap-2">
                        <a class="btn btn-sm btn-outline-light" href="/web/stocks/${stock.stockId}/edit">Update</a>
                        <a class="btn btn-sm btn-buy" href="/web/trade">Trade</a>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function refreshStocks() {
        try {
            const response = await fetch('/stocks', { cache: 'no-store' });
            if (!response.ok) {
                return;
            }
            const stocks = await response.json();
            renderStocks(stocks);
        } catch (error) {
            // Ignore transient polling failures and try again on next interval.
        }
    }

    refreshStocks();
    setInterval(refreshStocks, 4000);
</script>
</body>
</html>
