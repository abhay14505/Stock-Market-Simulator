<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="surface-card form-shell">
                <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
                    <div>
                        <p class="metric-label mb-2">Trading Desk</p>
                        <h1 class="text-white mb-1">Execute Trade</h1>
                        <p class="text-dark-muted mb-0">Select trader, stock, quantity, and transaction type.</p>
                    </div>
                </div>
                <form th:action="@{/web/trade}" th:object="${tradeForm}" method="post" class="row g-3" id="tradeFormElement">
                    <div class="col-md-6">
                        <label class="form-label">Trader</label>
                        <select class="form-select" th:field="*{traderId}" required>
                            <option value="">Select trader</option>
                            <option th:each="trader : ${traders}"
                                    th:value="${trader.userId}"
                                    th:text="${trader.name + ' | Balance: Rs ' + #numbers.formatDecimal(trader.balance, 1, 2)}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Stock</label>
                        <select class="form-select" th:field="*{stockId}" id="stockSelect" required>
                            <option value="">Select stock</option>
                            <option th:each="stock : ${stocks}"
                                    th:value="${stock.stockId}"
                                    th:attr="data-price=${stock.price}"
                                    th:text="${stock.name + ' | Rs ' + #numbers.formatDecimal(stock.price, 1, 2)}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input type="number" min="1" class="form-control" th:field="*{quantity}" id="quantityInput" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label d-block">Trade Type</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <input class="btn-check" type="radio" th:field="*{type}" value="BUY" id="buyOption">
                                <label class="radio-pill radio-pill-buy" for="buyOption">BUY</label>
                            </div>
                            <div class="col-6">
                                <input class="btn-check" type="radio" th:field="*{type}" value="SELL" id="sellOption">
                                <label class="radio-pill radio-pill-sell" for="sellOption">SELL</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="trade-summary">
                            <div class="metric-label mb-2">Live Calculation</div>
                            <div class="fs-4 fw-bold">Estimated Trade Value: <span id="tradeValue">Rs 0.00</span></div>
                        </div>
                    </div>
                    <div class="col-12 d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-accent">Submit Trade</button>
                        <a class="btn btn-outline-light" th:href="@{/web/stocks}">View Stocks</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const stockSelect = document.getElementById('stockSelect');
    const quantityInput = document.getElementById('quantityInput');
    const tradeValue = document.getElementById('tradeValue');

    function updateTradeValue() {
        const selected = stockSelect.options[stockSelect.selectedIndex];
        const price = Number(selected?.dataset?.price || 0);
        const quantity = Number(quantityInput.value || 0);
        tradeValue.textContent = 'Rs ' + (price * quantity).toFixed(2);
    }

    stockSelect.addEventListener('change', updateTradeValue);
    quantityInput.addEventListener('input', updateTradeValue);
    updateTradeValue();
</script>
</body>
</html>
