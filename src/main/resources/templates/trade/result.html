<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="surface-card" th:if="${errorMessage != null}">
                <p class="metric-label mb-2">Trade Status</p>
                <h1 class="mb-3 text-sell">Transaction Failed</h1>
                <p class="fs-5" th:text="${errorMessage}"></p>
                <div class="d-flex gap-2 pt-2">
                    <a class="btn btn-accent" th:href="@{/web/trade}">Back to Trade</a>
                    <a class="btn btn-outline-light" th:href="@{/web/traders}">View Traders</a>
                </div>
            </div>

            <div class="surface-card" th:if="${transaction != null}">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
                    <div>
                        <p class="metric-label mb-2">Trade Confirmation</p>
                        <h1 class="mb-0">Transaction Result</h1>
                    </div>
                    <span class="badge-soft" th:classappend="${transaction.type == 'BUY'} ? ' badge-buy' : ' badge-sell'" th:text="${transaction.type}"></span>
                </div>
                <div class="row g-3">
                    <div class="col-md-6"><div class="stat-card"><div class="metric-label">Trader</div><div class="fs-4 fw-bold" th:text="${trader.name}"></div></div></div>
                    <div class="col-md-6"><div class="stat-card"><div class="metric-label">Stock Name</div><div class="fs-4 fw-bold" th:text="${stock.name}"></div></div></div>
                    <div class="col-md-4"><div class="stat-card"><div class="metric-label">Quantity</div><div class="metric-value" th:text="${transaction.quantity}"></div></div></div>
                    <div class="col-md-4"><div class="stat-card"><div class="metric-label">Price / Share</div><div class="metric-value" th:text="${'Rs ' + #numbers.formatDecimal(transaction.price, 1, 2)}"></div></div></div>
                    <div class="col-md-4"><div class="stat-card"><div class="metric-label">Total Value</div><div class="metric-value" th:text="${'Rs ' + #numbers.formatDecimal(transaction.quantity * transaction.price, 1, 2)}"></div></div></div>
                    <div class="col-12">
                        <div class="surface-card">
                            <div class="metric-label mb-2">Timestamp</div>
                            <div class="fs-5 fw-semibold" th:text="${#temporals.format(transaction.timestamp, 'dd MMM yyyy, hh:mm a')}"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 pt-4 flex-wrap">
                    <a class="btn btn-accent" th:href="@{/web/trade}">Back to Trade</a>
                    <a class="btn btn-outline-light" th:href="@{/web/portfolio/{id}(id=${trader.userId})}">View Portfolio</a>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
