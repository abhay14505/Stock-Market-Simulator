<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <p class="metric-label mb-2">Trader Registry</p>
            <h1 class="mb-0">All Traders</h1>
        </div>
        <a class="btn btn-accent" th:href="@{/web/traders/new}">Register New Trader</a>
    </div>

    <div class="surface-card table-panel">
        <div th:if="${#lists.isEmpty(traders)}" class="empty-state">No traders available yet.</div>
        <div th:unless="${#lists.isEmpty(traders)}" class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Trader ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Balance</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="trader : ${traders}">
                    <td th:text="${trader.userId}"></td>
                    <td th:text="${trader.name}"></td>
                    <td th:text="${trader.email}"></td>
                    <td th:text="${'Rs ' + #numbers.formatDecimal(trader.balance, 1, 2)}"></td>
                    <td class="d-flex flex-wrap gap-2">
                        <a class="btn btn-sm btn-outline-light" th:href="@{/web/portfolio/{id}(id=${trader.userId})}">View Portfolio</a>
                        <a class="btn btn-sm btn-outline-warning" th:href="@{/web/dashboard/{id}(id=${trader.userId})}">View Dashboard</a>
                        <a class="btn btn-sm btn-outline-success" th:href="@{/web/transactions/{id}(id=${trader.userId})}">Transactions</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
