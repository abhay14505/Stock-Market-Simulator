<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Trader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{layout/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="surface-card form-shell">
                <p class="metric-label mb-2">New Trader</p>
                <h1 class="text-white mb-3">Register Trader</h1>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                <form th:action="@{/web/traders/new}" th:object="${trader}" method="post" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Initial Balance</label>
                        <input type="number" min="0" step="0.01" class="form-control" th:field="*{balance}" required>
                    </div>
                    <div class="col-12 d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-accent">Create Trader</button>
                        <a class="btn btn-outline-light" th:href="@{/web/traders}">Back to Traders</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
